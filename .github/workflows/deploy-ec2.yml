name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run tests
        run: ./gradlew test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image reference
        run: echo "IMAGE_REF=ghcr.io/${GITHUB_REPOSITORY,,}:${GITHUB_SHA}" >> "${GITHUB_ENV}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_REF }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate deploy secrets
        run: |
          test -n "${{ secrets.EC2_HOST }}" || (echo "Missing EC2_HOST secret" && exit 1)
          test -n "${{ secrets.EC2_USER }}" || (echo "Missing EC2_USER secret" && exit 1)
          test -n "${{ secrets.EC2_APP_DIR }}" || (echo "Missing EC2_APP_DIR secret" && exit 1)
          test -n "${{ secrets.EC2_SSH_KEY }}" || (echo "Missing EC2_SSH_KEY secret" && exit 1)

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::381492209613:role/GitHubActionsDropDealDeploy
          aws-region: ap-northeast-2

      - name: Detect runner public IP
        run: |
          RUNNER_IP="$(curl -fsS https://checkip.amazonaws.com | tr -d '[:space:]')"
          if [[ ! "${RUNNER_IP}" =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
            echo "Could not determine a valid runner IPv4 address." >&2
            exit 1
          fi
          echo "RUNNER_CIDR=${RUNNER_IP}/32" >> "${GITHUB_ENV}"

      - name: Allow runner SSH access
        id: allow_runner_ssh
        env:
          SECURITY_GROUP_ID: sg-0f70c83f2bfb428d5
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id "${SECURITY_GROUP_ID}" \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_CIDR}"

      - name: Add EC2 host key
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -T 30 -H "${EC2_HOST}" > /tmp/ec2_known_host; then
              cat /tmp/ec2_known_host >> ~/.ssh/known_hosts
              rm -f /tmp/ec2_known_host
              exit 0
            fi

            rm -f /tmp/ec2_known_host
            if [ "${attempt}" -lt 5 ]; then
              echo "SSH host key scan failed (attempt ${attempt}/5). Retrying in 10 seconds..."
              sleep 10
            fi
          done

          echo "Could not retrieve the EC2 SSH host key after 5 attempts." >&2
          exit 1

      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          IMAGE_REF: ${{ env.IMAGE_REF }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
            -i ~/.ssh/ec2_deploy_key "${EC2_USER}@${EC2_HOST}" \
            "EC2_APP_DIR='${EC2_APP_DIR}' GITHUB_REPOSITORY='${GITHUB_REPOSITORY}' GITHUB_REF_NAME='${GITHUB_REF_NAME}' IMAGE_REF='${IMAGE_REF}' GHCR_USER='${GHCR_USER}' GHCR_TOKEN='${GHCR_TOKEN}' bash -s" <<'EOF'
          set -euo pipefail

          REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git"

          mkdir -p "${EC2_APP_DIR}"
          cd "${EC2_APP_DIR}"

          if [ ! -d .git ]; then
            git init
            git remote add origin "${REPO_URL}"
          fi

          git fetch origin "${GITHUB_REF_NAME}"
          git reset --hard "origin/${GITHUB_REF_NAME}"

          if [ ! -f .env ]; then
            echo "Missing ${EC2_APP_DIR}/.env. Create it from .env.example on EC2 before deploying." >&2
            exit 1
          fi

          if docker info >/dev/null 2>&1; then
            DOCKER="docker"
          else
            DOCKER="sudo docker"
          fi

          ${DOCKER} version
          if ! ${DOCKER} compose version >/dev/null 2>&1; then
            if ! command -v curl >/dev/null 2>&1; then
              if command -v dnf >/dev/null 2>&1; then
                sudo dnf install -y curl-minimal
              elif command -v apt-get >/dev/null 2>&1; then
                sudo apt-get update
                sudo apt-get install -y curl
              else
                echo "docker compose plugin is missing and no supported package manager was found to install curl." >&2
                exit 1
              fi
            fi

            ARCH="$(uname -m)"
            case "${ARCH}" in
              x86_64) COMPOSE_ARCH="x86_64" ;;
              aarch64|arm64) COMPOSE_ARCH="aarch64" ;;
              *)
                echo "Unsupported architecture for Docker Compose: ${ARCH}" >&2
                exit 1
                ;;
            esac

            sudo mkdir -p /usr/local/lib/docker/cli-plugins
            sudo curl -fsSL "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-${COMPOSE_ARCH}" \
              -o /usr/local/lib/docker/cli-plugins/docker-compose
            sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
          fi

          ${DOCKER} compose version

          printf '%s' "${GHCR_TOKEN}" | ${DOCKER} login ghcr.io -u "${GHCR_USER}" --password-stdin
          trap '${DOCKER} logout ghcr.io >/dev/null 2>&1 || true' EXIT

          BACKEND_IMAGE="${IMAGE_REF}" ${DOCKER} compose pull
          BACKEND_IMAGE="${IMAGE_REF}" ${DOCKER} compose up -d --no-build
          ${DOCKER} image prune -f
          BACKEND_IMAGE="${IMAGE_REF}" ${DOCKER} compose ps
          EOF

      - name: Revoke runner SSH access
        if: ${{ always() && steps.allow_runner_ssh.outcome == 'success' }}
        env:
          SECURITY_GROUP_ID: sg-0f70c83f2bfb428d5
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "${SECURITY_GROUP_ID}" \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_CIDR}"
