name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Run tests
        run: ./gradlew test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Validate deploy secrets
        run: |
          test -n "${{ secrets.EC2_HOST }}" || (echo "Missing EC2_HOST secret" && exit 1)
          test -n "${{ secrets.EC2_USER }}" || (echo "Missing EC2_USER secret" && exit 1)
          test -n "${{ secrets.EC2_APP_DIR }}" || (echo "Missing EC2_APP_DIR secret" && exit 1)
          test -n "${{ secrets.EC2_SSH_KEY }}" || (echo "Missing EC2_SSH_KEY secret" && exit 1)

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key

      - name: Add EC2 host key
        run: |
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          ssh -i ~/.ssh/ec2_deploy_key "${EC2_USER}@${EC2_HOST}" \
            "EC2_APP_DIR='${EC2_APP_DIR}' GITHUB_REPOSITORY='${GITHUB_REPOSITORY}' GITHUB_REF_NAME='${GITHUB_REF_NAME}' bash -s" <<'EOF'
          set -euo pipefail

          REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git"

          mkdir -p "${EC2_APP_DIR}"
          cd "${EC2_APP_DIR}"

          if [ ! -d .git ]; then
            git init
            git remote add origin "${REPO_URL}"
          fi

          git fetch origin "${GITHUB_REF_NAME}"
          git checkout -B "${GITHUB_REF_NAME}" "origin/${GITHUB_REF_NAME}"
          git pull --ff-only origin "${GITHUB_REF_NAME}"

          if [ ! -f .env ]; then
            echo "Missing ${EC2_APP_DIR}/.env. Create it from .env.example on EC2 before deploying." >&2
            exit 1
          fi

          docker compose up -d --build
          docker image prune -f
          docker compose ps
          EOF
